startCommand:
  type: http
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        title: Team API Key
        description: >-
          Optional X-API-Key for team-plan access to paid verification tools
          (check_pricing, compare_pricing_pages, assess_compliance_posture,
          compare_competitors, verify_claim, estimate_market, test_hypothesis).
          Leave empty to use free endpoint and security-header checks
          (check_endpoint, inspect_security_headers) or agentic x402 pay-per-use.
        default: ""
    required: []
