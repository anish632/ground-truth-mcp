name: Publish MCP Registry

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Sync server.json version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          node -e 'const fs=require("fs"); const path="server.json"; const version=process.env.VERSION; const json=JSON.parse(fs.readFileSync(path,"utf8")); json.version=version; fs.writeFileSync(path, JSON.stringify(json, null, 2) + "\n");'
        env:
          VERSION: ${{ github.ref_name }}

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: |
          set +e
          OUTPUT="$(./mcp-publisher publish 2>&1)"
          STATUS=$?
          echo "$OUTPUT"

          if [ "$STATUS" -ne 0 ] && echo "$OUTPUT" | grep -q "cannot publish duplicate version"; then
            echo "Version is already published; treating duplicate publish as success."
            exit 0
          fi

          exit "$STATUS"
